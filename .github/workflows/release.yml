name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.changelog.outputs.tag }}
      version: ${{ steps.changelog.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and changelog notes
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          START_LINE="$(grep -nE "^## \\[$VERSION\\]" CHANGELOG.md | head -n1 | cut -d: -f1)"
          if [ -z "${START_LINE:-}" ]; then
            echo "No changelog section found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          END_LINE="$(tail -n +"$((START_LINE + 1))" CHANGELOG.md | grep -nE "^## \\[" | head -n1 | cut -d: -f1 || true)"
          if [ -n "${END_LINE:-}" ]; then
            END_LINE="$((START_LINE + END_LINE - 1))"
            sed -n "${START_LINE},$((END_LINE - 1))p" CHANGELOG.md > RELEASE_NOTES.md
          else
            sed -n "${START_LINE},\$p" CHANGELOG.md > RELEASE_NOTES.md
          fi

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Generated release notes are empty"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

  publish-crates:
    name: Publish to crates.io
    needs: github-release
    if: needs.github-release.result == 'success'
    runs-on: ubuntu-latest
    environment: crates-publish
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag and crate version match
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.github-release.outputs.tag }}"
          TAG_VERSION="${TAG#v}"
          CRATE_VERSION="$(grep -E '^version = \"' Cargo.toml | head -n1 | cut -d'\"' -f2)"

          if [ -z "${CRATE_VERSION:-}" ]; then
            echo "Could not determine crate version from Cargo.toml"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CRATE_VERSION)"
            exit 1
          fi

      - name: Verify package
        run: cargo package --locked

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
